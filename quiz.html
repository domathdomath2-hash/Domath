                ]

                    { q: "القيمة البعيدة جداً عن بقية القيم تسمى:", options: ["الوسيط", "القيمة المتطرفة", "المتوسط"], correct: 1 }
                ]
            },
            "12": {
                title: "التمثيل بالنقاط",
                questions: [
                    { q: "في التمثيل بالنقاط، نستخدم عادة الرمز:", options: ["دائرة", "مربع", "X"], correct: 2 },
                    { q: "الأساس الذي يتم رسم التمثيل بالنقاط عليه هو:", options: ["خط الأعداد", "المحور الرأسي", "المربع"], correct: 0 }
                ]
            },
            "13": {
                title: "قراءة التمثيل بالأعمدة",
                questions: [
                    { q: "أطول عمود في الرسم البياني يدل على:", options: ["البيانات الأقل", "البيانات الأكثر", "الوسيط"], correct: 1 },
                    { q: "المحور الذي تُكتب عليه الأرقام والتدريجات يسمى:", options: ["المحور الرأسي", "المحور الأفقي", "العنوان"], correct: 0 }
                ]
            },

            // ================= الفصل الدراسي الثاني =================
            "14": { 
                title: "القسمة مع باق",
                questions: [
                    { q: "ما هو ناتج قسمة 17 ÷ 5 ؟", options: ["3 والباقي 2", "3 والباقي 1", "4"], correct: 0 },
                    { q: "إذا وزعنا 22 تفاحة على 4 طلاب بالتساوي، كم تفاحة تتبقى؟", options: ["1", "2", "3"], correct: 1 }
                ]
            },
            "15": { 
                title: "القسمة على مضاعفات 10/100/1000",
                questions: [
                    { q: "ما هو ناتج قسمة 400 ÷ 10 ؟", options: ["4", "40", "400"], correct: 1 },
                    { q: "عند قسمة 5000 ÷ 100، كم صفراً نحذف من المقسوم؟", options: ["صفر واحد", "صفران", "ثلاثة أصفار"], correct: 1 }
                ]
            },
            "16": { 
                title: "تقدير ناتج القسمة",
                questions: [
                    { q: "قدر ناتج قسمة 124 ÷ 4 (استخدم 120 كأقرب مضاعف):", options: ["30", "40", "20"], correct: 0 },
                    { q: "التقدير الأنسب لناتج 358 ÷ 6 هو:", options: ["50", "60", "70"], correct: 1 }
                ]
            },
            "17": { 
                title: "الأشكال الثلاثية الأبعاد",
                questions: [
                    { q: "مجسم له 6 أوجه مربعة متطابقة، هو:", options: ["المكعب", "الهرم", "الأسطوانة"], correct: 0 },
                    { q: "المجسم الذي ليس له رؤوس ولا أحرف هو:", options: ["المخروط", "الكرة", "المنشور"], correct: 1 }
                ]
            },
            "18": { 
                title: "الأشكال الثنائية الأبعاد",
                questions: [
                    { q: "المضلع الذي له 5 أضلاع يسمى مضلعاً:", options: ["سداسياً", "خماسياً", "رباعياً"], correct: 1 },
                    { q: "الشكل الثنائي الأبعاد هو شكل له:", options: ["طول وعرض فقط", "طول وعرض وارتفاع", "حجم"], correct: 0 }
                ]
            },
            "19": { 
                title: "الزوايا",
                questions: [
                    { q: "الزاوية التي قياسها 90 درجة تسمى زاوية:", options: ["حادة", "قائمة", "منفرجة"], correct: 1 },
                    { q: "الزاوية الحادة هي الزاوية التي قياسها:", options: ["أقل من 90", "أكبر من 90", "تساوي 180"], correct: 0 }
                ]
            },
            "20": { 
                title: "المثلثات",
                questions: [
                    { q: "مجموع زوايا أي مثلث يساوي:", options: ["90 درجة", "180 درجة", "360 درجة"], correct: 1 },
                    { q: "المثلث الذي جميع أضلاعه مختلفة الطول يسمى:", options: ["متطابق الأضلاع", "متطابق الضلعين", "مختلف الأضلاع"], correct: 2 }
                ]
            },
            "21": { 
                title: "الأشكال الرباعية",
                questions: [
                    { q: "شكل رباعي جميع أضلاعه متطابقة وزواياه الأربع قائمة:", options: ["المستطيل", "المربع", "المعين"], correct: 1 },
                    { q: "شكل رباعي فيه كل ضلعين متقابلين متوازيان ومتطابقان:", options: ["متوازي الأضلاع", "شبه المنحرف", "المثلث"], correct: 0 }
                ]
            },
            "22": { 
                title: "المستوى الإحداثي",
                questions: [
                    { q: "نقطة الأصل في المستوى الإحداثي هي:", options: ["(1,1)", "(0,1)", "(0,0)"], correct: 2 },
                    { q: "الزوج المرتب يُكتب دائماً على الصورة:", options: ["(س, ص)", "(ص, س)", "(ص, ص)"], correct: 0 }
                ]
            },
            "23": { 
                title: "الكسور الاعتيادية بوصفها أجزاء من الكل",
                questions: [
                    { q: "الكسر الذي يمثل نصف الشيء يكتب:", options: ["1/3", "1/4", "1/2"], correct: 2 },
                    { q: "في الكسر 3/4 ، ماذا يسمى الرقم 4؟", options: ["البسط", "المقام", "الناتج"], correct: 1 }
                ]
            },
            "24": { 
                title: "جمع وطرح الكسور الاعتيادية المتشابهة",
                questions: [
                    { q: "ما ناتج جمع الكسرين ( 1/5 + 2/5 ) ؟", options: ["3/10", "3/5", "2/5"], correct: 1 },
                    { q: "ما ناتج طرح الكسرين ( 4/7 - 1/7 ) ؟", options: ["3/0", "5/7", "3/7"], correct: 2 }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let lessonId = urlParams.get('lesson');
        const quizContainer = document.getElementById('quiz-content');
        
        if (!quizData[lessonId]) {
            document.getElementById('lesson-title-display').innerText = "درس قيد التجهيز";
            quizContainer.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h3 style="color: var(--accent-color); font-size: 24px; margin-bottom: 15px;">⏳ الأسئلة قيد التجهيز</h3>
                    <p style="font-size: 18px; color: #555;">تعمل الأستاذة بشاير على تجهيز أسئلة وتحديات ممتعة لهذا الدرس، عد قريباً!</p>
                    <a href="courses.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block;">العودة للمقررات</a>
                </div>
            `;
        } else {
            const currentLesson = quizData[lessonId];
            document.getElementById('lesson-title-display').innerText = "تحدي: " + currentLesson.title;

            let questionsHtml = "";
            currentLesson.questions.forEach((question, index) => {
                let optionsHtml = "";
                question.options.forEach((opt, optIndex) => {
                    let isCorrect = (optIndex === question.correct) ? "true" : "false";
                    optionsHtml += `<button class="option-btn" onclick="answerQuestion(this, 'q${index}', ${isCorrect})">${opt}</button>`;
                });

                questionsHtml += `
                    <div class="question-block" id="q${index}">
                        <div class="question-text">${index + 1}. ${question.q}</div>
                        <div class="options-grid">${optionsHtml}</div>
                        <div class="feedback-message"></div>
                    </div>
                `;
            });

            quizContainer.innerHTML = questionsHtml;

            let questionsAnswered = 0;
            const totalQuestions = currentLesson.questions.length;

            window.answerQuestion = function(btn, qId, isCorrect) {
                const qBlock = document.getElementById(qId);
                if (qBlock.getAttribute('data-done') === 'true') return;
                qBlock.setAttribute('data-done', 'true');
                questionsAnswered++;

                const feedback = qBlock.querySelector('.feedback-message');
                const allBtns = qBlock.querySelectorAll('.option-btn');

                if (isCorrect) {
                    btn.style.background = '#2ed573'; btn.style.borderColor = '#2ed573'; btn.style.color = '#fff';
                    feedback.innerText = 'إجابة صحيحة! +20 نقطة 🌟'; feedback.style.color = '#2ed573';
                    
                    // استخدمنا دالة الحفظ الذكية هنا بدال الزيادة الوهمية
                    if (typeof addPoints === 'function') {
                        addPoints(20);
                    }
                } else {
                    btn.style.background = '#ff4757'; btn.style.borderColor = '#ff4757'; btn.style.color = '#fff';
                    feedback.innerText = 'إجابة خاطئة! حاول التركيز أكثر.'; feedback.style.color = '#ff4757';
                }

                allBtns.forEach(b => {
                    b.style.cursor = 'not-allowed';
                    if(b.getAttribute('onclick').includes('true')) {
                        b.style.border = '2px solid #2ed573'; b.style.color = '#2ed573';
                    }
                });

                if (questionsAnswered === totalQuestions) {
                    document.getElementById('final-result').style.display = 'block';
                }
            };
        }
    </script>
</body>
